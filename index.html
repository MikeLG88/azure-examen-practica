<!DOCTYPE html>
<html lang="es">
<head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Azure PRO</title>

<style>
*{
  box-sizing:border-box;
}

body{
  font-family: Arial, sans-serif;
  background:#0f172a;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  margin:0;
  padding:10px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  width:100%;
  max-width:750px;
}

h2,h3{
  margin-top:10px;
}

button{
  margin-top:10px;
  padding:15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
  width:100%;
}

.option{
  display:block;
  width:100%;
  margin:5px 0;
  background:#334155;
  color:#fff;
}

.correct{background:#16a34a!important}
.wrong{background:#dc2626!important}
.next{background:#2563eb;color:white}

select,label{
  margin-top:10px;
  display:block;
  width:100%;
}

select{
  padding:10px;
  border-radius:6px;
}

.progressBar{
  height:10px;
  background:#334155;
  border-radius:5px;
  margin-top:10px;
}

.progress{
  height:10px;
  background:#22c55e;
  border-radius:5px;
}

/* 📱 Ajustes móviles */
@media (max-width:600px){
  .card{
    padding:15px;
  }

  h2{
    font-size:20px;
  }

  h3{
    font-size:16px;
  }

  button{
    font-size:15px;
    padding:14px;
  }
}
</style>
</head>

<body>

<div class="card" id="app">
  <h2>Simulador Azure PRO</h2>

  <label>Modo:</label>
  <select id="mode">
    <option value="ALL">Todos</option>
    <option value="DATOS">Datos</option>
    <option value="DEV">Programación</option>
  </select>

  <label>Subtema:</label>
  <select id="subtopic">
    <option value="ALL">Todos</option>
    <option value="Relacional">Relacional</option>
    <option value="NoSQL">NoSQL</option>
    <option value="Functions">Functions</option>
    <option value="Seguridad">Seguridad</option>
  </select>

  <label>Modo de juego:</label>
  <select id="gameMode">
    <option value="pro">⏱️ Pro</option>
    <option value="casual">⌛ Casual</option>
    <option value="relax">😎 Relax</option>
  </select>

  <label>
    <input type="checkbox" id="failedMode">
    Solo preguntas falladas
  </label>

  <button onclick="startQuiz()">Iniciar</button>

  <h3>📊 Historial</h3>
  <div id="history"></div>
</div>

<script src="preguntas.js"></script>

<script>
let quiz=[], current=0, score=0, answered=false;
let timer, timeLeft, currentMode;
let failedQuestions = JSON.parse(localStorage.getItem("failed")) || [];

const correctSound = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
const wrongSound = new Audio("https://www.soundjay.com/buttons/sounds/button-10.mp3");

function shuffle(arr){ return arr.sort(()=>Math.random()-0.5); }

function startQuiz(){
  const mode = document.getElementById("mode").value;
  const sub = document.getElementById("subtopic").value;
  const failedMode = document.getElementById("failedMode").checked;
  currentMode = document.getElementById("gameMode").value;

  let filtered = bank.filter(q =>
    (mode==="ALL"||q.cert===mode) &&
    (sub==="ALL"||q.topic===sub)
  );

  if(failedMode){
    filtered = filtered.filter(q => failedQuestions.includes(q.q));
  }

  if(filtered.length === 0){
    alert("No hay preguntas disponibles");
    return;
  }

  const unique = new Map();
  filtered.forEach(q=>{ if(!unique.has(q.q)) unique.set(q.q,q); });
  quiz = shuffle(Array.from(unique.values())).slice(0,20);

  current=0; score=0;

  document.getElementById("app").innerHTML = `
    <h3 id="cert"></h3>
    <p id="topic"></p>
    <h2 id="question"></h2>
    <div id="options"></div>
    <p id="feedback"></p>
    <p id="progress"></p>
    <div class="progressBar"><div id="bar" class="progress"></div></div>
    <button class="next" onclick="nextQuestion()">Siguiente</button>
  `;

  loadQuestion();
}

function loadQuestion(){
  const q = quiz[current];
  document.getElementById("cert").innerText = q.cert;
  document.getElementById("topic").innerText = "Subtema: "+q.topic;
  document.getElementById("question").innerText = q.q;

  document.getElementById("progress").innerText =
    `Pregunta ${current+1}/${quiz.length}`;

  document.getElementById("bar").style.width =
    ((current/quiz.length)*100)+"%";

  const optDiv=document.getElementById("options");
  optDiv.innerHTML="";
  document.getElementById("feedback").innerText="";
  answered=false;

  q.o.forEach((opt,i)=>{
    const btn=document.createElement("button");
    btn.innerText=opt;
    btn.classList.add("option");
    btn.onclick=()=>selectAnswer(i);
    optDiv.appendChild(btn);
  });

  startTimer();
}

function startTimer(){
  clearInterval(timer);

  if(currentMode==="relax") return;

  timeLeft = currentMode==="pro" ? 15 : 30;

  timer = setInterval(()=>{
    timeLeft--;

    document.getElementById("progress").innerText =
      `Pregunta ${current+1}/${quiz.length} | ⏱️ ${timeLeft}s`;

    if(timeLeft<=0){
      clearInterval(timer);
      autoFail();
    }
  },1000);
}

function selectAnswer(i){
  if(answered) return;
  answered=true;
  clearInterval(timer);

  const q=quiz[current];
  const btns=document.querySelectorAll(".option");

  btns.forEach((b,index)=>{
    b.disabled=true;
    if(index===q.c)b.classList.add("correct");
    if(index===i && i!==q.c)b.classList.add("wrong");
  });

  if(i===q.c){
    score+=10;
    correctSound.play();
    document.getElementById("feedback").innerText="✅ +10 | "+q.tip;
  }else{
    score-=5;
    wrongSound.play();
    failedQuestions.push(q.q);
    localStorage.setItem("failed",JSON.stringify(failedQuestions));

    document.getElementById("feedback").innerText=
      "❌ -5 | Correcta: "+q.o[q.c]+" | "+q.tip;
  }
}

function autoFail(){
  const q=quiz[current];
  const btns=document.querySelectorAll(".option");

  btns.forEach((b,index)=>{
    b.disabled=true;
    if(index===q.c)b.classList.add("correct");
  });

  failedQuestions.push(q.q);
  localStorage.setItem("failed",JSON.stringify(failedQuestions));

  document.getElementById("feedback").innerText=
    "⏱️ Tiempo agotado | "+q.tip;

  answered=true;
}

function nextQuestion(){
  current++;
  if(current>=quiz.length){
    saveHistory();
    showResult();
    return;
  }
  loadQuestion();
}

function showResult(){
  document.getElementById("app").innerHTML=`
    <h2>Resultado</h2>
    <p>Puntaje: ${score}</p>
    <button onclick="location.reload()">Reiniciar</button>
  `;
}

function saveHistory(){
  let history = JSON.parse(localStorage.getItem("history")) || [];
  history.push(score);
  localStorage.setItem("history",JSON.stringify(history));
}

function loadHistory(){
  let history = JSON.parse(localStorage.getItem("history")) || [];
  let div=document.getElementById("history");
  div.innerHTML = history.map(h=>`<p>Score: ${h}</p>`).join("");
}

loadHistory();
</script>

</body>
</html>
