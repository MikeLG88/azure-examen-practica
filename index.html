<!DOCTYPE html>
<html lang="es">
<head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Azure PRO</title>

<style>
*{box-sizing:border-box;}

body{
  font-family: Arial;
  background:#0f172a;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  margin:0;
  padding:10px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  width:100%;
  max-width:900px;
}

button{
  margin-top:10px;
  padding:14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  width:100%;
}

.option{background:#334155;color:white;}
.correct{background:#16a34a!important}
.wrong{background:#dc2626!important}
.next{background:#2563eb;color:white}

.progressBar{
  height:10px;
  background:#334155;
  border-radius:5px;
  margin-top:10px;
}
.progress{
  height:10px;
  background:#22c55e;
}

.flex{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.left{flex:2;min-width:300px;}
.right{
  flex:1;
  min-width:250px;
  background:#0f172a;
  padding:15px;
  border-radius:10px;
}

@media(max-width:600px){
  .flex{flex-direction:column;}
}
</style>
</head>

<body>

<div class="card" id="app">

<h2>Simulador Azure PRO</h2>

<label>Modo:</label>
<select id="mode">
  <option value="ALL">Todos</option>
  <option value="DATOS">Datos</option>
  <option value="DEV">Programación</option>
</select>

<label>Subtema:</label>
<select id="subtopic">
  <option value="ALL">Todos</option>
  <option value="Relacional">Relacional</option>
  <option value="NoSQL">NoSQL</option>
  <option value="Functions">Functions</option>
  <option value="Seguridad">Seguridad</option>
</select>

<label>Modo:</label>
<select id="gameMode">
  <option value="pro">⏱️ Pro</option>
  <option value="casual">⌛ Casual</option>
  <option value="relax">😎 Relax</option>
</select>

<label>
<input type="checkbox" id="failedMode"> Solo falladas
</label>

<button onclick="startQuiz()">Iniciar</button>

<h3>Historial</h3>
<div id="history"></div>

</div>

<script src="preguntas.js"></script>

<script>
let quiz=[], current=0, score=0, answered=false;
let timer, timeLeft, currentMode;
let failedQuestions = JSON.parse(localStorage.getItem("failed")) || [];
let stats = {};

/* 🔊 SONIDOS (FIX REAL) */
const correctSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3");
const wrongSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3");

function safePlay(sound){
  sound.currentTime = 0;
  sound.play().catch(()=>{});
}

/* UTIL */
function shuffle(arr){ return arr.sort(()=>Math.random()-0.5); }

/* START */
function startQuiz(){
  const mode = document.getElementById("mode").value;
  const sub = document.getElementById("subtopic").value;
  const failedMode = document.getElementById("failedMode").checked;
  currentMode = document.getElementById("gameMode").value;

  let filtered = bank.filter(q =>
    (mode==="ALL"||q.cert===mode) &&
    (sub==="ALL"||q.topic===sub)
  );

  if(failedMode){
    filtered = filtered.filter(q => failedQuestions.includes(q.q));
  }

  if(filtered.length===0){
    alert("No hay preguntas");
    return;
  }

  const unique = new Map();
  filtered.forEach(q=>{
    if(!unique.has(q.q)) unique.set(q.q,q);
  });

  quiz = shuffle(Array.from(unique.values())).slice(0,20);

  current=0;
  score=0;
  stats={};

  document.getElementById("app").innerHTML=`
  <div class="flex">
    <div class="left">
      <h3 id="cert"></h3>
      <p id="topic"></p>
      <h2 id="question"></h2>
      <div id="options"></div>
      <p id="progress"></p>
      <div class="progressBar"><div id="bar" class="progress"></div></div>
      <button class="next" onclick="nextQuestion()">Siguiente</button>
    </div>

    <div class="right">
      <h3>🧠 Explicación</h3>
      <p id="explanation">Responde para ver explicación...</p>
    </div>
  </div>
  `;

  loadQuestion();
}

/* LOAD */
function loadQuestion(){
  const q = quiz[current];

  document.getElementById("cert").innerText = q.cert;
  document.getElementById("topic").innerText = "Subtema: "+q.topic;
  document.getElementById("question").innerText = q.q;

  document.getElementById("progress").innerText =
    `Pregunta ${current+1}/${quiz.length}`;

  document.getElementById("bar").style.width =
    ((current/quiz.length)*100)+"%";

  const optDiv=document.getElementById("options");
  optDiv.innerHTML="";
  document.getElementById("explanation").innerText="Responde para ver explicación...";
  answered=false;

  q.o.forEach((opt,i)=>{
    const btn=document.createElement("button");
    btn.innerText=opt;
    btn.classList.add("option");
    btn.onclick=()=>selectAnswer(i);
    optDiv.appendChild(btn);
  });

  startTimer();
}

/* TIMER */
function startTimer(){
  clearInterval(timer);

  if(currentMode==="relax") return;

  timeLeft = currentMode==="pro" ? 15 : 30;

  timer=setInterval(()=>{
    timeLeft--;

    document.getElementById("progress").innerText =
      `Pregunta ${current+1}/${quiz.length} | ⏱️ ${timeLeft}s`;

    if(timeLeft<=0){
      clearInterval(timer);
      autoFail();
    }
  },1000);
}

/* ANSWER */
function selectAnswer(i){
  if(answered) return;
  answered=true;
  clearInterval(timer);

  const q=quiz[current];
  const btns=document.querySelectorAll(".option");

  btns.forEach((b,index)=>{
    b.disabled=true;
    if(index===q.c)b.classList.add("correct");
    if(index===i && i!==q.c)b.classList.add("wrong");
  });

  if(!stats[q.topic]) stats[q.topic]={correct:0,wrong:0};

  if(i===q.c){
    score+=10;
    stats[q.topic].correct++;
    safePlay(correctSound);

    document.getElementById("explanation").innerText =
      "✅ Correcto\n\n" +
      "✔ " + q.o[q.c] + "\n\n" +
      "💡 " + q.tip;

  }else{
    score-=5;
    stats[q.topic].wrong++;
    safePlay(wrongSound);

    failedQuestions.push(q.q);
    localStorage.setItem("failed",JSON.stringify(failedQuestions));

    document.getElementById("explanation").innerText =
      "❌ Incorrecto\n\n" +
      "✔ Correcta: " + q.o[q.c] + "\n\n" +
      "💡 " + q.tip;
  }
}

/* AUTO FAIL */
function autoFail(){
  const q=quiz[current];
  const btns=document.querySelectorAll(".option");

  btns.forEach(b=>{
    b.disabled=true;
    b.classList.add("wrong");
  });

  if(!stats[q.topic]) stats[q.topic]={correct:0,wrong:0};
  stats[q.topic].wrong++;

  score-=5;

  failedQuestions.push(q.q);
  localStorage.setItem("failed",JSON.stringify(failedQuestions));

  document.getElementById("explanation").innerText =
    "⏱️ Tiempo agotado\n\n💡 " + q.tip;

  answered=true;
}

/* NEXT */
function nextQuestion(){
  current++;
  if(current>=quiz.length){
    saveHistory();
    showResult();
    return;
  }
  loadQuestion();
}

/* ANALISIS */
function generateAnalysis(){
  let txt="🧠 ANALISIS\n\n";

  for(let t in stats){
    let s=stats[t];
    let total=s.correct+s.wrong;
    let p=Math.round((s.correct/total)*100);

    txt+=`${t}: ${p}%\n`;

    if(p<50) txt+="⚠️ Estudiar fuerte\n\n";
    else if(p<80) txt+="🟡 Repasar\n\n";
    else txt+="🟢 Bien\n\n";
  }

  return txt;
}

/* RESULT */
function showResult(){
  const analysis=generateAnalysis();

  document.getElementById("app").innerHTML=`
    <h2>Resultado</h2>
    <p>Puntaje: ${score}</p>

    <pre style="background:#0f172a;padding:15px;border-radius:10px;text-align:left">
${analysis}
    </pre>

    <button onclick="location.reload()">Reiniciar</button>
  `;
}

/* HISTORIAL */
function saveHistory(){
  let h=JSON.parse(localStorage.getItem("history"))||[];
  h.push(score);
  localStorage.setItem("history",JSON.stringify(h));
}

function loadHistory(){
  let h=JSON.parse(localStorage.getItem("history"))||[];
  document.getElementById("history").innerHTML=
    h.map(x=>`<p>${x}</p>`).join("");
}

loadHistory();
</script>

</body>
</html>
